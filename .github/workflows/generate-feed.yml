name: Generate Feeds

on:
  schedule:
    # Blog feed only (no API keys needed): once daily at 6:17am UTC
    # X and podcast feeds are sourced from upstream zarazhangrui/follow-builders
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'blogs-only'
        type: choice
        options:
          - blogs-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        run: cd scripts && node generate-feed.js --blogs-only

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-blogs.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update blog feed [skip ci]"
          git push
